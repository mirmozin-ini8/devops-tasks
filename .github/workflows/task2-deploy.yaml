name: github-actions-cicd

on:
  push:
    branches: [main]
    paths: ['task2-files/**', 'task1-files/**']
  workflow_dispatch:

jobs:
  build-and-push:
    name: build and push docker image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.vars.outputs.sha }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set image tag
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: ./task1-files 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/simple-api-server:${{ steps.vars.outputs.sha }}

  deploy:
    name: deploy to kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup ssh agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.JUMP_SERVER_SSH_KEY }}

      - name: copy helm chart to jump server
        run: |
          ssh-keyscan -H ${{ secrets.JUMP_SERVER_IP }} >> ~/.ssh/known_hosts
          scp -r ./task1-files/simple-api-chart ${{ secrets.JUMP_SERVER_USER }}@${{ secrets.JUMP_SERVER_IP }}:~/simple-api-chart

      - name: deploy via helm
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.JUMP_SERVER_USER }}@${{ secrets.JUMP_SERVER_IP }} \
          "helm upgrade --install simple-api ~/simple-api-chart \
          --reuse-values \
          --set image.repository=\"${DOCKER_USER}/simple-api-server\" \
          --set image.tag=\"${IMAGE_TAG}\" \
          --set image.pullPolicy=\"Always\" \
          --namespace default \
          --wait"

      - name: verify rollout
        run: |
          ssh ${{ secrets.JUMP_SERVER_USER }}@${{ secrets.JUMP_SERVER_IP }} \
            "kubectl rollout status deployment/simple-api-simple-api-chart -n default"