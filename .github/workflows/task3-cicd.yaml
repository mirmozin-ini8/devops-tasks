name: book-ordering-cicd

on:
  push: 
    branches: [main]

    paths:
      - 'task3-files/**'
  workflow_dispatch:

jobs: 
  test-and-lint:
    runs-on: ubuntu-latest
    strategy: 
      matrix:
        service: [book-service, user-service, order-service]

    steps:
      - uses: actions/checkout@v4
      - name: setup up go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
    
      - name: lint and test
        run: |
          cd ./task3-files/${{ matrix.service }}
          go vet ./...
          go test -v ./...

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [book-service, user-service, order-service]
    outputs:
      image-tag: ${{ steps.vars.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
      - name: set short SHA
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: login to dockerhub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: ./task3-files/${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env: 
      TAG: ${{ needs.build-and-push.outputs.image-tag }}
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v4

      - name: setup ssh agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.JUMP_SERVER_SSH_KEY }}
        
      - name: copy latest helm chart to jump server
        run: |
          ssh-keyscan -H ${{ secrets.JUMP_SERVER_IP }} >> ~/.ssh/known_hosts
          scp -r ./task3-files/book-ordering ${{ secrets.JUMP_SERVER_USER }}@${{ secrets.JUMP_SERVER_IP }}:~/

      - name: deploy via helm
        run: | 
          ssh -O StrictHostKeyChecking=no ${{ secrets.JUMP_SERVER_USER }}@${{ secrets.JUMP_SERVER_IP }} "helm upgrade --install book-ordering ~/book-ordering --namespace book-ordering --create-namespace --set images.bookService.tag=${TAG} --set images.userService.tag=${TAG} --set images.orderService.tag=${TAG} --atomic --wait"

      - name: verify rollout
        run: |
          ssh -O StrictHostKeyChecking=no ${{ secrets.JUMP_SERVER_USER }}@${{ secrets.JUMP_SERVER_IP }} "kubectl rollout status deployment/book-service -n book-ordering && kubectl rollout status deployment/order-service -n book-ordering && kubectl rollout status deployment/user-service -n book-ordering"

      - name: notification
        if: always()
        run: echo "deployment of version ${TAG} finished with status ${{ job.status }}"
  