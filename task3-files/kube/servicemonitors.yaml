apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: book-service
  namespace: monitoring
  labels:
    app: book-service
spec:
  namespaceSelector:
    matchNames:
      - book-ordering
  selector:
    matchLabels:
      app: book-service
  endpoints:
    - port: http
      path: /books/metrics
      interval: 30s
    
