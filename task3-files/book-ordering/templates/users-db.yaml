apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: users-db-pvc
    namespace: {{ .Values.namespace }}
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: {{ .Values.storage.users }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: users-db
    namespace: {{ .Values.namespace }}
    labels:
        app: users-db
spec:
    replicas: 1
    selector:
        matchLabels:
            app: users-db
    template:  
        metadata:
            labels:
                app: users-db
        spec:
            containers:
              - name: users-db
                image: {{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}
                imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
                ports: 
                  - containerPort: 5432
                env:
                  - name: POSTGRES_USER
                    valueFrom:
                        configMapKeyRef:
                            name: app-config
                            key: USERS_DB_USER

                  - name: POSTGRES_DB
                    valueFrom:
                        configMapKeyRef:
                            name: app-config
                            key: USERS_DB_NAME

                  - name: POSTGRES_PASSWORD
                    valueFrom: 
                        secretKeyRef:
                            name: db-secret
                            key: postgres-password
                resources:
                    requests:
                        cpu:  {{ .Values.resources.postgres.requests.cpu }}
                        memory:  {{ .Values.resources.postgres.requests.memory }}
                    limits:
                        cpu:  {{ .Values.resources.postgres.limits.cpu }}
                        memory:  {{ .Values.resources.postgres.limits.memory }}
                volumeMounts:
                  - name: users-db-storage
                    mountPath: /var/lib/postgresql/data

                readinessProbe:
                    exec:
                        command:
                          - pg_isready
                          - -U
                          - postgres
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    failureThreshold: 6

                livenessProbe:
                    exec:
                        command:
                          - pg_isready
                          - -U
                          - postgres
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    failureThreshold: 3
            volumes:
              - name: users-db-storage
                persistentVolumeClaim:
                    claimName: users-db-pvc
    
---
apiVersion: v1
kind: Service
metadata:
    name: users-db
    namespace: {{ .Values.namespace }}
spec:
    selector:
        app: users-db
    ports:
      - port: 5432
        targetPort: 5432
    type: ClusterIP