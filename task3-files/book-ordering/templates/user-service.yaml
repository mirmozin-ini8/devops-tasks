apiVersion: apps/v1
kind: Deployment
metadata:
    name: user-service
    namespace: {{ .Values.namespace }}
    labels:
        app: user-service
spec:
    replicas: {{ .Values.replicaCount.userService }}
    selector:
        matchLabels:
            app: user-service
    template:
        metadata:
            labels:
                app: user-service
        spec:
            containers:
              - name: user-service
                image: {{ .Values.images.userService.repository }}:{{ .Values.images.userService.tag }}
                imagePullPolicy: {{ .Values.images.userService.pullPolicy }}
                ports:
                  - containerPort: {{ .Values.ports.userService }}
                envFrom:
                  - configMapRef:
                        name: app-config
                env:
                  - name: USERS_DB_PASSWORD
                    valueFrom:
                        secretKeyRef:
                            name: db-secret
                            key: postgres-password
                  - name: SECRET_KEY
                    valueFrom:
                        secretKeyRef:
                            name: db-secret
                            key: jwt-secret
                resources:
                    requests:
                        cpu: {{ .Values.resources.userService.requests.cpu }}
                        memory: {{ .Values.resources.userService.requests.memory }}
                    limits:
                        cpu: {{ .Values.resources.userService.limits.cpu }}
                        memory: {{ .Values.resources.userService.limits.memory }}
                livenessProbe:
                    httpGet:
                        path: /health
                        port: {{ .Values.ports.userService }}

                    initialDelaySeconds: 15
                    periodSeconds: 10
                    failureThreshold: 3

                readinessProbe:
                    httpGet:
                        path: /health
                        port: {{ .Values.ports.userService }}
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
    name: user-service
    namespace: {{ .Values.namespace }}
spec:
    selector:
        app: user-service
    ports:
      - port: {{ .Values.ports.userService }}
        targetPort: {{ .Values.ports.userService }}
    type: ClusterIP